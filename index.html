<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ReplyHero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="replyhero.css">
</head>

<body>

  <div class="shell">
    <div class="app">

      <div class="app-header">
        <div class="left-header">
          <div>
            <div class="app-title">ReplyHero</div>
            <div class="app-subtitle">Smart replies for real conversations.</div>
          </div>
        </div>
        <div class="header-right">
          <button class="toggle-dark" id="darkToggle">Dark mode</button>

          <!-- ⭐ NEW UPGRADE BUTTON -->
          <button class="btn-primary" id="upgradeBtn" style="margin-left:10px;">
            Upgrade to Pro
          </button>

          <button id="manageBillingBtn" class="btn-outline" style="display:none; margin-left:10px;">
            Manage Subscription
          </button>

          <div id="proBadge" style="
            display:none;
            background:#4CAF50;
            color:white;
            padding:6px 12px;
            border-radius:8px;
            font-weight:600;
            margin-left:10px;
          ">
            PRO Active
          </div>
        </div>
      </div>

      <!-- LOGIN BAR -->
      <div class="login-bar" style="display:flex; gap:10px; margin-bottom:16px;">
        <input id="email"
               type="email"
               placeholder="Email"
               style="flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text);" />

        <input id="password"
               type="password"
               placeholder="Password"
               style="flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text);" />

        <button onclick="loginUser()" class="btn-primary" style="white-space:nowrap;">
          Login
        </button>

        <button onclick="signupUser()" class="btn-outline" style="white-space:nowrap;">
          Sign Up
        </button>
      </div>

      <!-- ⭐ FREE PLAN MESSAGE (correct location) -->
      <div id="freeMessage" style="
        display:none;
        margin-bottom:16px;
        color:var(--text);
        font-size:14px;
      ">
        You have <span id="freeCount">15</span> free replies remaining.
      </div>

      <div class="mode-row">
        <div>
          <div class="mode-label">Mode</div>
          <div class="segmented" id="modeSegment">
            <button data-mode="reply" class="active">Generate Reply</button>
            <button data-mode="rewrite">Rewrite My Reply</button>
          </div>
        </div>
        <div>
          <div class="mode-label">Reply length</div>
          <div class="segmented" id="lengthSegment">
            <button data-length="Short">Short</button>
            <button data-length="Medium" class="active">Medium</button>
            <button data-length="Long">Long</button>
          </div>
        </div>
      </div>

      <!-- ⭐ OLD IMAGE SECTION REMOVED -->

      <div class="input-card">
        <div class="input-label-row">
          <div class="input-label" id="inputLabel">Paste your conversation</div>
          <div class="input-hint" id="inputHint">
            Include both sides so ReplyHero understands context.
          </div>
        </div>

        <textarea id="conversation" placeholder="Paste the message here..."></textarea>

        <!-- ⭐ NEW IMAGE UPLOAD SECTION (correct location) -->
        <div class="upload-wrapper" style="margin-top:16px;">
          <label for="imageInput" class="mode-label">Upload a screenshot (optional)</label>

          <input type="file" id="imageInput" accept="image/*">

          <!-- ⭐ Filename + Clear button row -->
          <div id="uploadRow" style="display:flex; align-items:center; gap:10px; margin-top:6px;">
            <div id="uploadedFileName" style="font-size:14px; color:#555;"></div>

            <!-- ⭐ Clear Upload button (hidden until file is selected) -->
            <button id="clearUploadBtn" class="btn-outline" style="display:none; padding:4px 8px;">
              Clear
            </button>
          </div>
        </div>

        <div class="options-row">
          <div class="select-group">
            <div class="mode-label">Tone</div>
            <select id="tone">
              <option value="professional">Professional</option>
              <option value="formal">Formal</option>
              <option value="warm">Warm</option>
              <option value="direct">Direct</option>
              <option value="executive">Executive</option>
              <option value="empathetic">Empathetic</option>
              <option value="customer-service">Customer‑Service</option>
              <option value="friendly">Friendly</option>
              <option value="flirty">Flirty</option>
              <option value="assertive">Assertive</option>
              <option value="casual">Casual</option>
              <option value="apologetic">Apologetic</option>
              <option value="enthusiastic">Enthusiastic</option>
              <option value="supportive">Supportive</option>
              <option value="sarcastic">Sarcastic</option>
              <option value="humorous">Humorous</option>
              <option value="romantic">Romantic</option>
              <option value="motivational">Motivational</option>
              <option value="stern">Stern</option>
            </select>
          </div>

          <div style="display:flex; gap:8px;">
            <button class="btn-primary" id="generateBtn">
              Generate Reply
            </button>
          </div>
        </div>
      </div>

      <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
        Crafting your replies…
      </div>

      <div class="output-section">
        <div class="output-header-row">
          <div>
            <div class="output-title">Reply options</div>
            <div class="output-subtitle">Three variations you can copy or tweak.</div>
          </div>
        </div>
        <div id="output"></div>
      </div>

    </div>
  </div>

<script>
const API_BASE = "https://replyhero-backend.onrender.com";

/* ---------------------------
   LOAD USER INFO
----------------------------*/

async function loadUser() {
  const res = await fetch(`${API_BASE}/me`, {
    credentials: "include"
  });

  const user = await res.json();
  console.log("ME endpoint:", user);
  return user;
}

/* Run on page load */
document.addEventListener("DOMContentLoaded", async () => {
  const user = await loadUser();
  updateUI(user);
});

function updateUI(user) {
  const upgradeBtn = document.getElementById("upgradeBtn");
  const proBadge = document.getElementById("proBadge");
  const loginBar = document.querySelector(".login-bar");
  const freeMessage = document.getElementById("freeMessage");
  const freeCount = document.getElementById("freeCount");

  // Not logged in
  if (!user.logged_in) {
    loginBar.style.display = "flex";
    upgradeBtn.style.display = "none";
    proBadge.style.display = "none";
    freeMessage.style.display = "none";

    // ⭐ Hide Manage Subscription
    document.getElementById("manageBillingBtn").style.display = "none";

    return;
  }

  // Logged in → hide login bar
  loginBar.style.display = "none";

  // FREE PLAN
if (user.plan === "free") {
  upgradeBtn.style.display = "inline-block";
  proBadge.style.display = "none";

  freeMessage.style.display = "block";
  const remaining = 15 - (user.free_uses || 0);
  freeCount.textContent = remaining;

  // Disable generate button if limit reached
  if (remaining <= 0) {
    generateBtn.disabled = true;
    generateBtn.textContent = "Limit reached";
    generateBtn.style.opacity = "0.5";
  } else {
    generateBtn.disabled = false;
    generateBtn.textContent = "Generate Reply";
    generateBtn.style.opacity = "1";
  }

  // ⭐ Hide Manage Subscription for FREE users
  document.getElementById("manageBillingBtn").style.display = "none";

  return;
}

  // PRO PLAN
  if (user.plan === "pro") {
    upgradeBtn.style.display = "none";
    proBadge.style.display = "inline-block";
    freeMessage.style.display = "none";

    generateBtn.disabled = false;
    generateBtn.textContent = "Generate Reply";
    generateBtn.style.opacity = "1";

    // ⭐ Show Manage Subscription button
    document.getElementById("manageBillingBtn").style.display = "inline-block";
  }
}

/* ---------------------------
   AUTH: SIGNUP + LOGIN
----------------------------*/
async function signupUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const response = await fetch(`${API_BASE}/signup`, {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await response.json();
  console.log("Signup:", data);

  if (data.message === "Signup successful") {
    alert("Account created! You are now logged in.");
  } else {
    alert("Signup failed: " + (data.error || "Unknown error"));
  }
}

async function loginUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const response = await fetch(`${API_BASE}/login`, {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await response.json();
  console.log("Login:", data);

  if (data.message === "Login successful") {
    alert("Logged in!");
  } else {
    alert("Login failed: " + (data.error || "Unknown error"));
  }
}

/* ---------------------------
   UI ELEMENTS
----------------------------*/
const conversationEl = document.getElementById("conversation");
const toneEl = document.getElementById("tone");
const outputEl = document.getElementById("output");
const loadingEl = document.getElementById("loading");
const darkToggle = document.getElementById("darkToggle");
const modeSegment = document.getElementById("modeSegment");
const lengthSegment = document.getElementById("lengthSegment");
const inputLabel = document.getElementById("inputLabel");
const inputHint = document.getElementById("inputHint");
const imageInput = document.getElementById("imageInput");
const generateBtn = document.getElementById("generateBtn");
const uploadedFileName = document.getElementById("uploadedFileName");
const clearUploadBtn = document.getElementById("clearUploadBtn");

// ⭐ Show filename + Clear button when a file is uploaded
imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];

  if (file) {
    uploadedFileName.textContent = file.name;
    clearUploadBtn.style.display = "inline-block";
  }
});

// ⭐ Clear Upload button logic
clearUploadBtn.addEventListener("click", () => {
  imageInput.value = "";
  uploadedFileName.textContent = "";
  clearUploadBtn.style.display = "none";

  // Reset mode so Rewrite works correctly
  currentMode = "reply";
});


let currentMode = "reply";
let currentLength = "Medium";

/* ---------------------------
   DARK MODE
----------------------------*/
function loadTheme() {
  const saved = localStorage.getItem("replyhero_theme");
  if (saved === "dark") {
    document.body.classList.add("dark");
  }
}

function saveTheme() {
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("replyhero_theme", isDark ? "dark" : "light");
}

darkToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  saveTheme();
});

loadTheme();

/* ---------------------------
   MODE SWITCHING
----------------------------*/
function updateModeUI() {
  const buttons = modeSegment.querySelectorAll("button");
  buttons.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mode === currentMode);
  });

  if (currentMode === "reply") {
    inputLabel.textContent = "Paste your conversation";
    inputHint.textContent = "Include both sides so ReplyHero understands context.";
    conversationEl.placeholder = "Paste the message here...";
  } else {
    inputLabel.textContent = "Paste your draft reply";
    inputHint.textContent = "ReplyHero will rewrite it using the selected tone and length.";
    conversationEl.placeholder = "Hi [Name],\n\nI’m writing to follow up on...";
  }
}

modeSegment.addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  currentMode = e.target.dataset.mode;
  updateModeUI();
});

/* ---------------------------
   LENGTH SWITCHING
----------------------------*/
function updateLengthUI() {
  const buttons = lengthSegment.querySelectorAll("button");
  buttons.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.length === currentLength);
  });
}

lengthSegment.addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  currentLength = e.target.dataset.length;
  updateLengthUI();
});

updateModeUI();
updateLengthUI();

/* ---------------------------
   ⭐ SUGGESTION BOX
   Auto-selects /reply or /reply-image
----------------------------*/

function showSuggestionBox() {
  const box = document.createElement("div");
  box.style.marginTop = "20px";

  box.innerHTML = `
    <div class="mode-label">Add facts or corrections (optional)</div>

    <textarea id="factsInput" placeholder="Add missing details, corrections, or context..."
      style="width:100%; min-height:60px; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); margin-top:6px;"></textarea>

    <button id="updateRepliesBtn" class="btn-primary" style="margin-top:10px;">
      Update Replies
    </button>
  `;

  outputEl.appendChild(box);

  // ⭐ Attach handler for updating replies
  document.getElementById("updateRepliesBtn").addEventListener("click", () => {
    generateReplies(true); // pass flag to indicate update mode
  });
}

/* ---------------------------
   ⭐ SINGLE BUTTON HANDLER
   Auto-selects /reply or /reply-image
----------------------------*/
async function generateReplies(isUpdate = false) {
  const conversation = conversationEl.value.trim();
  const tone = toneEl.value;
  const file = imageInput.files[0];

  outputEl.innerHTML = "";
  loadingEl.style.display = "block";

  try {

    // ⭐  capture facts only if updating
    let facts = "";
    if (isUpdate) {
      const factsInput = document.getElementById("factsInput");
      facts = factsInput ? factsInput.value.trim() : "";
    }

    // If Rewrite Mode is active, force-clear the file so /reply-image is NOT used
    if (currentMode === "rewrite" && file) {
      imageInput.value = "";
      uploadedFileName.textContent = "";
      clearUploadBtn.style.display = "none";
    }

    /* ------------------------------------
   CASE 1: IMAGE UPLOADED → /reply-image
-------------------------------------*/
if (file) {
  const formData = new FormData();
  formData.append("image", file);
  formData.append("tone", toneEl.value);
  formData.append("rewrite", currentMode === "rewrite");
  formData.append("length", currentLength);
  formData.append("facts", facts);

  const res = await fetch(`${API_BASE}/reply-image`, {
    method: "POST",
    credentials: "include",
    body: formData
  });

  loadingEl.style.display = "none";

  if (res.status === 401) {
    outputEl.innerHTML = `<div class="output-card">You must be logged in.</div>`;
    return;
  }

  if (res.status === 402) {
    outputEl.innerHTML = `<div class="output-card">You’ve reached your free reply limit.</div>`;

    generateBtn.disabled = true;
    generateBtn.textContent = "Limit reached";
    generateBtn.style.opacity = "0.5";

    return;
  }

  const data = await res.json();

  if (data.error) {
    outputEl.innerHTML = `<div class="output-card">${data.error}</div>`;
    return;
  }

  // ⭐ Correct rendering for /reply-image
  outputEl.innerHTML = "";

  data.replies.forEach((reply, index) => {
    const card = document.createElement("div");
    card.className = "output-card";

    const header = document.createElement("div");
    header.className = "output-card-header";

    const label = document.createElement("div");
    label.className = "output-label";
    label.textContent = `Option ${index + 1}`;

    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "Copy";

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(reply);
        copyBtn.textContent = "Copied";
        copyBtn.classList.add("copied");
        setTimeout(() => {
          copyBtn.textContent = "Copy";
          copyBtn.classList.remove("copied");
        }, 1200);
      } catch {
        alert("Could not copy to clipboard.");
      }
    });

    header.appendChild(label);
    header.appendChild(copyBtn);

    const body = document.createElement("div");
    body.className = "output-card-body";
    body.textContent = reply;

    card.appendChild(header);
    card.appendChild(body);
    outputEl.appendChild(card);
  });

  showSuggestionBox();

  return; // ⭐ important — stop here so text mode doesn't run
}

    /* ------------------------------------
       CASE 2: NO IMAGE → /reply
    -------------------------------------*/
    if (!conversation) {
      loadingEl.style.display = "none";
      alert("Please paste a conversation or upload a screenshot.");
      return;
    }

    let replies = [];

    for (let i = 0; i < 3; i++) {
      const res = await fetch(`${API_BASE}/reply`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: conversation,
          conversation: [],
          tone: tone,
          rewrite: currentMode === "rewrite",
          length: currentLength
          facts: facts
        })
      });

      if (res.status === 401) {
        loadingEl.style.display = "none";
        outputEl.innerHTML = `<div class="output-card">You must be logged in.</div>`;
        return;
      }

      if (res.status === 402) {
        loadingEl.style.display = "none";
        outputEl.innerHTML = `<div class="output-card">You’ve reached your free reply limit.</div>`;
        return;
      }

      const data = await res.json();

      if (data.error) {
        loadingEl.style.display = "none";
        outputEl.innerHTML = `<div class="output-card">${data.error}</div>`;
        return;
      }

      replies = data.replies;
    }

    loadingEl.style.display = "none";
    outputEl.innerHTML = "";

    replies.forEach((reply, index) => {
      const card = document.createElement("div");
      card.className = "output-card";

      const header = document.createElement("div");
      header.className = "output-card-header";

      const label = document.createElement("div");
      label.className = "output-label";
      label.textContent = `Option ${index + 1}`;

      const copyBtn = document.createElement("button");
      copyBtn.className = "copy-btn";
      copyBtn.textContent = "Copy";

      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(reply);
          copyBtn.textContent = "Copied";
          copyBtn.classList.add("copied");
          setTimeout(() => {
            copyBtn.textContent = "Copy";
            copyBtn.classList.remove("copied");
          }, 1200);
        } catch {
          alert("Could not copy to clipboard.");
        }
      });

      header.appendChild(label);
      header.appendChild(copyBtn);

      const body = document.createElement("div");
      body.textContent = reply;

      card.appendChild(header);
      card.appendChild(body);
      outputEl.appendChild(card);
    });

  showSuggestionBox();

  } catch (err) {
    loadingEl.style.display = "none";
    outputEl.innerHTML = `<div class="output-card">Error: Could not reach backend.</div>`;
  }
}
/* ---------------------------
   ⭐ STRIPE CHECKOUT
----------------------------*/
document.getElementById("upgradeBtn").addEventListener("click", async () => {
  try {
    const response = await fetch(`${API_BASE}/create-checkout-session`, {
      method: "POST",
      credentials: "include"
    });

    const data = await response.json();

    if (data.url) {
      window.location.href = data.url; // Redirect to Stripe Checkout
    } else {
      alert("Error creating checkout session");
    }
  } catch (err) {
    console.error(err);
    alert("Something went wrong while starting checkout.");
  }
});

/* ⭐ Attach single handler */
document.getElementById("generateBtn").addEventListener("click", generateReplies);

/* ---------------------------
   ⭐ Manage Billing
----------------------------*/

document.getElementById("manageBillingBtn").onclick = async () => {
  const res = await fetch(`${API_BASE}/billing-portal`, {
    method: "POST",
    credentials: "include"
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Could not open billing portal.");
  }
};

</script>

</body>
</html>
