<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ReplyHero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="replyhero.css">
</head>

<body>

  <div class="shell">
    <div class="app">

      <div class="app-header">
        <div class="left-header">
          <div>
            <div class="app-title">ReplyHero</div>
            <div class="app-subtitle">Smart replies for real conversations.</div>
          </div>
        </div>
        <div class="header-right">
          <button class="toggle-dark" id="darkToggle">Dark mode</button>

          <!-- ⭐ NEW UPGRADE BUTTON -->
          <button class="btn-primary" id="upgradeBtn" style="margin-left:10px;">
            Upgrade to Pro
          </button>

          <button id="manageBillingBtn" class="btn-outline" style="display:none; margin-left:10px;">
            Manage Subscription
          </button>

          <div id="proBadge" style="
            display:none;
            background:#4CAF50;
            color:white;
            padding:6px 12px;
            border-radius:8px;
            font-weight:600;
            margin-left:10px;
          ">
            PRO Active
          </div>
        </div>
      </div>

      <!-- LOGIN BAR -->
      <div class="login-bar" style="display:flex; gap:10px; margin-bottom:16px;">
        <input id="email"
               type="email"
               placeholder="Email"
               style="flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text);" />

        <input id="password"
               type="password"
               placeholder="Password"
               style="flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text);" />

        <button onclick="loginUser()" class="btn-primary" style="white-space:nowrap;">
          Login
        </button>

        <button onclick="signupUser()" class="btn-outline" style="white-space:nowrap;">
          Sign Up
        </button>
      </div>

      <!-- ⭐ FREE PLAN MESSAGE (correct location) -->
      <div id="freeMessage" style="
        display:none;
        margin-bottom:16px;
        color:var(--text);
        font-size:14px;
      ">
        You have <span id="freeCount">15</span> free replies remaining.
      </div>

      <!-- ⭐ MODE SELECTOR -->
      <div class="mode-row">
        <div>
          <div class="mode-label">Mode</div>
          <div class="mode-tabs" id="modeTabs">
            <button data-mode="paste" class="active">Reply to Conversation</button>
            <button data-mode="start">Rewrite for me</button>
            <button data-mode="upload">Upload Screenshot</button>
            <button data-mode="file">Upload Email File</button>
          </div>
        </div>
      </div>

      <!-- ⭐ TEXT INPUT WRAPPER -->
      <div id="textInputWrapper" class="input-card" style="margin-top:16px;">
        <div class="input-label-row">
          <div class="input-label">Message</div>
          <div class="input-hint">Paste your conversation or start a new message.</div>
        </div>

        <textarea id="conversationInput" placeholder="Paste the conversation here..."></textarea>
      </div>

      <!-- ⭐ UPLOAD WRAPPER -->
      <div id="uploadWrapper" class="upload-wrapper" style="margin-top:16px; display:none;">
        <label for="imageInput" class="mode-label">Upload a file (optional)</label>

        <input
          type="file"
          id="imageInput"
          accept=".msg,.eml,.txt,.pdf,image/*"
        >

        <div id="uploadRow" style="display:flex; align-items:center; gap:10px; margin-top:6px;">
          <div id="uploadedFileName" style="font-size:14px; color:#555;"></div>
          <button id="clearUploadBtn" class="btn-outline" style="display:none; padding:4px 8px;">Clear</button>
        </div>
      </div>

      <!-- ⭐ REPLY SHOULD INCLUDE -->
      <div class="input-card" style="margin-top:16px;">
        <div class="input-label">Reply Should Include…</div>
        <input id="includeInput"
               class="include-input"
               placeholder="emojis, mention I'm running late, add meeting time, etc.">
      </div>

      <!-- ⭐ TONE + LENGTH + GENERATE -->
      <div class="options-row" style="margin-top:16px; align-items:flex-end;">

        <!-- Tone -->
        <div class="select-group">
          <div class="mode-label">Tone</div>
          <select id="toneSelect">

            <!-- ⭐ ALPHABETIZED TONES -->
            <option value="Academic">Academic</option>
            <option value="Apologetic">Apologetic</option>
            <option value="Assertive">Assertive</option>
            <option value="Casual">Casual</option>
            <option value="Corporate Passive-Aggressive">Corporate Passive‑Aggressive</option>
            <option value="Debate-Oriented">Debate-Oriented</option>
            <option value="Direct">Direct</option>
            <option value="Dry British">Dry British</option>
            <option value="Enthusiastic">Enthusiastic</option>
            <option value="Fact-Driven">Fact-Driven</option>
            <option value="Gamer">Gamer / Esports</option>
            <option value="Gen-Z Chaotic">Gen‑Z Chaotic</option>
            <option value="Hippie">Hippie</option>
            <option value="Humorous">Humorous</option>
            <option value="Influencer">Influencer</option>
            <option value="Intimate X">Intimate X (Emotionally Deep)</option>
            <option value="Lawyer-Style">Lawyer‑Style</option>
            <option value="Minimalist">Minimalist</option>
            <option value="Mom Friend">Mom Friend</option>
            <option value="Motivational">Motivational</option>
            <option value="Naturalist">Naturalist</option>
            <option value="Pet Lovers">Pet Lovers (Animal-Oriented)</option>
            <option value="Politics-Democrat">Politics – Democrat</option>
            <option value="Politics-Neutral">Politics – Neutral</option>
            <option value="Politics-Republican">Politics – Republican</option>
            <option value="Poetic">Poetic</option>
            <option value="Professional-Executive">Professional / Executive</option>
            <option value="Promotional">Promotional</option>
            <option value="Romantic-Flirty">Romantic / Flirty</option>
            <option value="Sarcastic">Sarcastic</option>
            <option value="Savage">Savage</option>
            <option value="Southern Sweet">Southern Sweet</option>
            <option value="Sports Enthusiasts">Sports Enthusiasts</option>
            <option value="Stern">Stern</option>
            <option value="Supportive">Supportive</option>
            <option value="Techie">Techie</option>
            <option value="Therapist-Style">Therapist‑Style</option>
            <option value="Toxic-Narcissist Defense">Toxic-Narcissist Defense</option>
            <option value="Victorian Formal">Victorian Formal</option>
            <option value="Villain Arc">Villain Arc</option>
            <option value="Warm-Empathetic">Warm / Empathetic</option>
            <option value="Weirdcore">AI Weirdcore</option>
            <option value="Youthful">Youthful</option>

          </select>
        </div>

        <!-- Reply Length -->
        <div class="select-group">
          <div class="mode-label">Reply Length</div>
          <div class="mode-tabs" id="lengthTabs">
            <button data-length="Short">Short</button>
            <button data-length="Medium" class="active">Medium</button>
            <button data-length="Long">Long</button>
          </div>
        </div>

        <!-- Generate -->
        <button class="btn-primary" id="generateBtn">
          Generate Reply
        </button>
      </div>

      <!-- ⭐ OUTPUT -->
      <div id="loading" style="display:none; margin-top:16px;">Generating reply…</div>
      <div class="output-section">
        <div class="output-header-row">
          <div>
            <div class="output-title">Reply options</div>
            <div class="output-subtitle">Three variations you can copy or tweak.</div>
          </div>
        </div>
        <div id="output"></div>
      </div>

<script>
let currentUser = null;

const API_BASE = "https://api.reply-hero.com";

/* ---------------------------
   LOAD USER INFO
----------------------------*/

async function loadUser() {
  const res = await fetch(`${API_BASE}/me`, {
    credentials: "include"
  });

  const user = await res.json();
  console.log("ME endpoint:", user);
  return user;
}

/* Run on page load */
document.addEventListener("DOMContentLoaded", async () => {
  currentUser = await loadUser();
  updateUI(currentUser);
});

function updateUI(user) {
  const upgradeBtn = document.getElementById("upgradeBtn");
  const proBadge = document.getElementById("proBadge");
  const loginBar = document.querySelector(".login-bar");
  const freeMessage = document.getElementById("freeMessage");
  const freeCount = document.getElementById("freeCount");

  // Not logged in
  if (!user || !user.logged_in) {
    loginBar.style.display = "flex";
    upgradeBtn.style.display = "none";
    proBadge.style.display = "none";
    freeMessage.style.display = "none";
    document.getElementById("manageBillingBtn").style.display = "none";
    return;
  }

  // Logged in
  loginBar.style.display = "none";

  // If plan is missing, treat as free (safe fallback)
  if (!user.plan) {
    user.plan = "free";
  }

  // FREE PLAN
  if (user.plan === "free") {
    upgradeBtn.style.display = "inline-block";
    proBadge.style.display = "none";

    freeMessage.style.display = "block";
    const remaining = 15 - (user.free_uses || 0);
    freeCount.textContent = remaining;

    if (remaining <= 0) {
      generateBtn.disabled = true;
      generateBtn.textContent = "Free Limit reached, You must Upgrade to Pro at $4.99/month, cancel anytime.";
      generateBtn.style.opacity = "0.5";
    } else {
      generateBtn.disabled = false;
      generateBtn.textContent = "Generate Reply";
      generateBtn.style.opacity = "1";
    }

    document.getElementById("manageBillingBtn").style.display = "none";
    return;
  }

  // PRO PLAN
  if (user.plan === "pro") {
    upgradeBtn.style.display = "none";
    proBadge.style.display = "inline-block";
    freeMessage.style.display = "none";

    generateBtn.disabled = false;
    generateBtn.textContent = "Generate Reply";
    generateBtn.style.opacity = "1";

    document.getElementById("manageBillingBtn").style.display = "inline-block";
  }
}


/* ---------------------------
   AUTH: SIGNUP + LOGIN
----------------------------*/
async function signupUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const response = await fetch(`${API_BASE}/signup`, {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await response.json();
  console.log("Signup:", data);

  if (data.message === "Signup successful") {
    alert("Account created! You are now logged in.");
  } else {
    alert("Signup failed: " + (data.error || "Unknown error"));
  }
}

async function loginUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const response = await fetch(`${API_BASE}/login`, {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await response.json();
  console.log("Login:", data);

  if (data.message === "Login successful") {
    alert("Logged in!");
  } else {
    alert("Login failed: " + (data.error || "Unknown error"));
  }
}

/* ---------------------------
   NEW UI ELEMENTS
----------------------------*/

// ⭐ Allowed MIME types for uploads
const allowedTypes = [
  'application/pdf',
  'text/plain',
  'message/rfc822',            // .eml
  'application/vnd.ms-outlook',// .msg
  'application/octet-stream',  // fallback for .msg
  'image/png',
  'image/jpeg',
  'image/jpg',
  'image/webp'
];

// ⭐ File-type icon helper
function getFileIcon(filename) {
  const ext = filename.split('.').pop().toLowerCase();

  const map = {
    'pdf': '📄',
    'txt': '📝',
    'msg': '✉️',
    'eml': '✉️',
    'png': '🖼️',
    'jpg': '🖼️',
    'jpeg': '🖼️',
    'webp': '🖼️'
  };

  return map[ext] || '📁';
}

// ⭐ Mode + Length tabs
const modeTabs = document.getElementById("modeTabs");
const lengthTabs = document.getElementById("lengthTabs");

// ⭐ Input wrappers
const textInputWrapper = document.getElementById("textInputWrapper");
const uploadWrapper = document.getElementById("uploadWrapper");

// ⭐ Text inputs
const conversationInput = document.getElementById("conversationInput");
const includeInput = document.getElementById("includeInput");

// ⭐ Tone + Generate
const toneSelect = document.getElementById("toneSelect");
const generateBtn = document.getElementById("generateBtn");

// ⭐ Output
const outputEl = document.getElementById("output");
const loadingEl = document.getElementById("loading");

// ⭐ Upload elements (click‑only)
const imageInput = document.getElementById("imageInput");
const uploadedFileName = document.getElementById("uploadedFileName");
const clearUploadBtn = document.getElementById("clearUploadBtn");

// ⭐ Prevent mode switching when clicking inside upload wrapper
uploadWrapper.addEventListener("click", (e) => {
  e.stopPropagation();
});

// ⭐ Show filename + Clear button when a file is uploaded
imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if (!file) return;

  // ⭐ Validate file type
  if (!allowedTypes.includes(file.type)) {
    alert("Unsupported file type.");
    imageInput.value = "";
    uploadedFileName.textContent = "";
    clearUploadBtn.style.display = "none";
    return;
  }

  // Show icon + filename
  uploadedFileName.textContent = `${getFileIcon(file.name)} ${file.name}`;
  clearUploadBtn.style.display = "inline-block";
});

// ⭐ Clear Upload button logic
clearUploadBtn.addEventListener("click", () => {
  imageInput.value = "";
  uploadedFileName.textContent = "";
  clearUploadBtn.style.display = "none";

  selectedMode = "paste"; // or "start", depending on your UX preference

});

/* ---------------------------
   STATE
----------------------------*/
let selectedMode = "paste";     // paste | start | upload | file
let selectedLength = "Medium";  // Short | Medium | Long

/* ---------------------------
   MODE SWITCHING
----------------------------*/
modeTabs.addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;

  selectedMode = e.target.dataset.mode;

  // Update active button
  [...modeTabs.children].forEach(btn =>
    btn.classList.toggle("active", btn.dataset.mode === selectedMode)
  );

  // ⭐ Update upload label depending on mode
  const uploadLabel = document.querySelector('label[for="imageInput"]');

  if (selectedMode === "upload") {
    uploadLabel.textContent = "Upload a screenshot";
  }

  if (selectedMode === "file") {
    uploadLabel.textContent = "Upload an email file (.eml, .txt, .pdf)";
  }

  // Show/hide input areas
  if (selectedMode === "upload" || selectedMode === "file") {
    textInputWrapper.style.display = "none";
    uploadWrapper.style.display = "block";
  } else {
    textInputWrapper.style.display = "block";
    uploadWrapper.style.display = "none";

    conversationInput.placeholder =
      selectedMode === "paste"
        ? "Paste the conversation here..."
        : "Start a new message...";
  }
});

/* ---------------------------
   LENGTH SWITCHING
----------------------------*/
lengthTabs.addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;

  selectedLength = e.target.dataset.length;

  [...lengthTabs.children].forEach(btn =>
    btn.classList.toggle("active", btn.dataset.length === selectedLength)
  );
});

/* ---------------------------
   GENERATE REPLIES
----------------------------*/
async function generateReplies() {
  outputEl.innerHTML = "";
  loadingEl.style.display = "block";

  const form = new FormData();
  form.append("mode", selectedMode);
  form.append("tone", toneSelect.value);
  form.append("length", selectedLength);
  form.append("include", includeInput.value);

  // ⭐ Text modes (paste + start)
  if (selectedMode === "paste" || selectedMode === "start") {
    form.append("conversation", conversationInput.value.trim());
  }

  // ⭐ Screenshot upload mode
  if (selectedMode === "upload" && imageInput.files[0]) {
    form.append("image", imageInput.files[0]);
  }

  // ⭐ Email file upload mode (.msg, .eml, .txt, .pdf, images)
  if (selectedMode === "file" && imageInput.files[0]) {
    form.append("file", imageInput.files[0]);
  }

  try {
    const res = await fetch(`${API_BASE}/generate-reply`, {
      method: "POST",
      credentials: "include",
      body: form
    });

    loadingEl.style.display = "none";

    if (res.status === 401) {
      outputEl.innerHTML = `<div class="output-card">You must be logged in.</div>`;
      return;
    }

    if (res.status === 402) {
      outputEl.innerHTML = `<div class="output-card">You’ve reached your free reply limit.</div>`;
      return;
    }

    const data = await res.json();

    /* ⭐ Update free_uses in UI if backend returned it */
    if (data.free_uses !== undefined && currentUser) {
      currentUser.free_uses = data.free_uses;
      updateUI(currentUser);
    }

    if (!data.replies) {
      outputEl.innerHTML = `
        <div class="output-card">
          ${data.error || "Error generating replies."}
        </div>
      `;
      return;
    }

    outputEl.innerHTML = "";

    data.replies.forEach((reply, index) => {
      const card = document.createElement("div");
      card.className = "output-card";

      card.innerHTML = `
        <div class="output-card-header">
          <div class="output-label">Option ${index + 1}</div>
          <button class="copy-btn">Copy</button>
        </div>
        <div>${reply}</div>
      `;

      const copyBtn = card.querySelector(".copy-btn");
      copyBtn.addEventListener("click", async () => {
        await navigator.clipboard.writeText(reply);
        copyBtn.textContent = "Copied";
        copyBtn.classList.add("copied");
        setTimeout(() => {
          copyBtn.textContent = "Copy";
          copyBtn.classList.remove("copied");
        }, 1200);
      });

      outputEl.appendChild(card);
    });

  } catch (err) {
    loadingEl.style.display = "none";
    outputEl.innerHTML = `<div class="output-card">Error: Could not reach backend.</div>`;
  }
}

/* ---------------------------
   BIND GENERATE BUTTON
----------------------------*/
generateBtn.addEventListener("click", generateReplies);

/* ---------------------------
   ⭐ STRIPE CHECKOUT
----------------------------*/
document.getElementById("upgradeBtn").addEventListener("click", async () => {
  try {
    const response = await fetch(`${API_BASE}/create-checkout-session`, {
      method: "POST",
      credentials: "include"
    });

    const data = await response.json();

    if (data.url) {
      window.location.href = data.url; // Redirect to Stripe Checkout
    } else {
      alert("Error creating checkout session");
    }
  } catch (err) {
    console.error(err);
    alert("Something went wrong while starting checkout.");
  }
});

/* ---------------------------
   ⭐ Manage Billing
----------------------------*/
document.getElementById("manageBillingBtn").onclick = async () => {
  const res = await fetch(`${API_BASE}/billing-portal`, {
    method: "POST",
    credentials: "include"
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Could not open billing portal.");
  }
};

/* ---------------------------
   ⭐ DARK MODE (unchanged)
----------------------------*/
function loadTheme() {
  const saved = localStorage.getItem("replyhero_theme");
  if (saved === "dark") {
    document.body.classList.add("dark");
  }
}

function saveTheme() {
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("replyhero_theme", isDark ? "dark" : "light");
}

darkToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  saveTheme();
});

loadTheme();

</script>
    </div>
  </div>
</body>
</html>
